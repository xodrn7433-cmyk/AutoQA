appId: com.banaple.foodproapp.banapresso
---

- tapOn:
      id: icon_cart

- tapOn:
      id: btn_go_menu

- tapOn: "커피/음료"

- tapOn:
      id: image_thumbnail
      retryTapIfNoChange: true

- tapOn: "ICED"
- tapOn: "담기"

- tapOn:
      id: icon_cart

- tapOn:
      id: icon_check

- extendedWaitUntil:
      visible: "2,000원"
      timeout: 4000

- tapOn:
      id: image_pllus
      retryTapIfNoChange: true

- extendedWaitUntil:
      visible: "4,000원"
      timeout: 4000

- tapOn:
      id: image_minus
      retryTapIfNoChange: true

- extendedWaitUntil:
      visible: "2,000원"
      timeout: 4000

- tapOn:
      id: icon_delete
      retryTapIfNoChange: true

- extendedWaitUntil:
      visible: "삭제"
      timeout: 3000

- tapOn: "삭제"

- extendedWaitUntil:
      visible: "장바구니에 담긴 메뉴가 없습니다."
      timeout: 5000

- tapOn:
      id: btn_back

- tapOn:
      id: icon_back

- tapOn: "추천"