appId: com.banaple.foodproapp.banapresso
---

# 옵션 영역이 보일 때까지 아래로 스크롤
- scrollUntilVisible:
    element:
      text: "샷추가(2샷)"
    direction: DOWN
    timeout: 5000

# 스크롤 애니메이션 종료 대기
- waitForAnimationToEnd
- waitForAnimationToEnd

# 옵션 선택
- tapOn: "샷추가(2샷)"

# ✅ 샷추가 적용 후 금액 검증 (핵심)
- assertVisible: "5,400원"

- tapOn:
    id: image_option_icon
    index: 1
- assertVisible: "바나리카노"
- assertVisible: "8,000원"


- tapOn:
    id: image_option_icon
    index: 4
- assertVisible: "시그니처 바나리카노"
- assertVisible: "8,200원"

- tapOn: 기본
- tapOn:
    id: image_option_icon
    index: 2
