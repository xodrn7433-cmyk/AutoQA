appId: com.banaple.foodproapp.banapresso
---

# 커피 담기
- tapOn: "커피/음료"

- extendedWaitUntil:
    visible:
      id: image_thumbnail
    timeout: 5000

- tapOn:
    id: image_thumbnail

- tapOn: "ICED"
- tapOn: "담기"

- extendedWaitUntil:
    visible:
      id: icon_back
    timeout: 5000

- tapOn:
    id: icon_back

# 푸드 담기
- tapOn: "푸드"

- scrollUntilVisible:
    element:
      text: "소불고기치즈파니니"
    direction: DOWN
    timeout: 7000

- tapOn: "소불고기치즈파니니"
- tapOn: "담기"

# 장바구니 확인
- tapOn:
    id: icon_cart

- extendedWaitUntil:
    visible: "테이크아웃"
    timeout: 5000

- assertVisible: "6,900원"

# 장바구니 비우기
- tapOn: "선택삭제"

- extendedWaitUntil:
    visible: "삭제"
    timeout: 5000

- tapOn: "삭제"

- extendedWaitUntil:
    visible:
      id: icon_back
    timeout: 5000

- tapOn:
    id: icon_back

- tapOn:
    id: icon_back

# 매장 변경
- tapOn: "커피/음료"
- tapOn: "변경"
- tapOn: "My 매장"
- tapOn: "테스트점"
- tapOn: "선택"

# 커피 다시 담기
- tapOn: "커피/음료"

- extendedWaitUntil:
    visible:
      id: image_thumbnail
    timeout: 5000

- tapOn:
    id: image_thumbnail

- tapOn: "ICED"
- tapOn: "담기"

- tapOn:
    id: icon_back

# 푸드 다시 담기
- tapOn: "푸드"

- scrollUntilVisible:
    element:
      text: "매콤닭가슴살파니니"
    direction: DOWN
    timeout: 7000

- tapOn: "매콤닭가슴살파니니"
- tapOn: "담기"

# 장바구니 확인
- tapOn:
    id: icon_cart

- extendedWaitUntil:
    visible: "6,400원"
    timeout: 5000